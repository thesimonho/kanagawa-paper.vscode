name: Theme Color Consistency
on:
  pull_request:
  push:
  workflow_dispatch:
jobs:
  validate-theme-colors:
    name: Validate Theme Colors
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run Theme Color Checks
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
        run: |
          node <<'NODE'
          const { execSync } = require('node:child_process');
          const fs = require('node:fs');

          const THEME_FILES = [
            'themes/kanagawa-paper-canvas-color-theme.json',
            'themes/kanagawa-paper-ink-color-theme.json',
          ];
          const THEME_META = {
            'themes/kanagawa-paper-ink-color-theme.json': {
              nvimTheme: 'ink',
            },
            'themes/kanagawa-paper-canvas-color-theme.json': {
              nvimTheme: 'canvas',
            },
          };
          const REQUIRED_SELECTION_KEYS = [
            'editor.selectionHighlightBackground',
            'editor.inactiveSelectionBackground',
          ];

          const eventName = process.env.EVENT_NAME || '';
          const prBaseSha = process.env.PR_BASE_SHA || '';
          const pushBeforeSha = process.env.PUSH_BEFORE_SHA || '';

          /**
           * Returns the base SHA for diffing edited files in CI.
           */
          function getBaseSha() {
            if (eventName === 'pull_request' && prBaseSha) {
              return prBaseSha;
            }
            if (eventName === 'push' && pushBeforeSha && !/^0+$/.test(pushBeforeSha)) {
              return pushBeforeSha;
            }
            return '';
          }

          /**
           * Finds edited theme files relative to base SHA. If base SHA is unavailable,
           * validates both themes so the workflow always returns a pass/fail result.
           */
          function getEditedThemeFiles(baseSha) {
            if (!baseSha) {
              return THEME_FILES.filter((file) => fs.existsSync(file));
            }

            const diffOutput = execSync(`git diff --name-only ${baseSha}...HEAD`, { encoding: 'utf8' });
            const changed = new Set(
              diffOutput
                .split('\n')
                .map((line) => line.trim())
                .filter(Boolean)
            );

            return THEME_FILES.filter((file) => changed.has(file));
          }

          const baseSha = getBaseSha();
          const editedThemes = getEditedThemeFiles(baseSha);

          console.log(`Event: ${eventName || 'unknown'}`);
          console.log(`Base SHA: ${baseSha || 'none (validating all theme files)'}`);
          console.log(`Edited theme files: ${editedThemes.length ? editedThemes.join(', ') : 'none'}`);

          if (editedThemes.length === 0) {
            console.log('No edited theme files detected. Marking check as pass.');
            process.exit(0);
          }

          const colorsLuaUrl =
            'https://raw.githubusercontent.com/thesimonho/kanagawa-paper.nvim/master/lua/kanagawa-paper/colors.lua';

          const colorsLua = execSync(`curl -fsSL --retry 3 --retry-delay 2 "${colorsLuaUrl}"`, {
            encoding: 'utf8',
          });

          const sourceHexSet = new Set(
            [...colorsLua.matchAll(/#[0-9A-Fa-f]{6}\b/g)].map((match) => match[0].toLowerCase())
          );

          if (sourceHexSet.size === 0) {
            console.error('Failed to load any 6-digit hex colors from upstream colors.lua');
            process.exit(1);
          }

          /**
           * Parses `M.palette = { ... }` from colors.lua to build a map of palette key to #RRGGBB.
           */
          function parsePaletteMap(luaSource) {
            const blockMatch = luaSource.match(/M\.palette\s*=\s*{([\s\S]*?)\n}\s*\n/);
            if (!blockMatch) {
              throw new Error('Failed to parse M.palette block from upstream colors.lua');
            }

            const map = new Map();
            for (const line of blockMatch[1].split('\n')) {
              const entry = line.match(/^\s*([A-Za-z0-9_]+)\s*=\s*"(#[0-9A-Fa-f]{6})"/);
              if (entry) {
                map.set(entry[1], entry[2].toLowerCase());
              }
            }
            return map;
          }

          /**
           * Resolves ui.bg_visual for a given nvim theme source (ink/canvas) to #RRGGBB.
           */
          function parseThemeVisualBase(themeLua, paletteMap, themeName) {
            const bgVisualMatch = themeLua.match(/bg_visual\s*=\s*([^,\n]+)/);
            if (!bgVisualMatch) {
              throw new Error(`Failed to find ui.bg_visual in upstream theme '${themeName}'`);
            }

            const rawValue = bgVisualMatch[1].trim();
            const literalHex = rawValue.match(/^"(#[0-9A-Fa-f]{6})"$/);
            if (literalHex) {
              return literalHex[1].toLowerCase();
            }

            const paletteRef = rawValue.match(/^palette\.([A-Za-z0-9_]+)$/);
            if (!paletteRef) {
              throw new Error(
                `Unsupported ui.bg_visual value '${rawValue}' in upstream theme '${themeName}'`
              );
            }

            const resolved = paletteMap.get(paletteRef[1]);
            if (!resolved) {
              throw new Error(
                `Failed to resolve palette key '${paletteRef[1]}' from upstream colors.lua`
              );
            }
            return resolved;
          }

          const paletteMap = parsePaletteMap(colorsLua);
          const expectedSelectionBaseByTheme = {};
          for (const { nvimTheme } of Object.values(THEME_META)) {
            if (expectedSelectionBaseByTheme[nvimTheme]) {
              continue;
            }

            const themeUrl =
              `https://raw.githubusercontent.com/thesimonho/kanagawa-paper.nvim/master/lua/kanagawa-paper/themes/${nvimTheme}.lua`;
            const themeLua = execSync(`curl -fsSL --retry 3 --retry-delay 2 "${themeUrl}"`, {
              encoding: 'utf8',
            });
            expectedSelectionBaseByTheme[nvimTheme] = parseThemeVisualBase(
              themeLua,
              paletteMap,
              nvimTheme
            );
          }

          const problems = [];

          /**
           * Recursively scans theme JSON values to find every hex token literal.
           */
          function walk(node, path, onString) {
            if (typeof node === 'string') {
              onString(node, path);
              return;
            }
            if (Array.isArray(node)) {
              node.forEach((value, index) => walk(value, `${path}[${index}]`, onString));
              return;
            }
            if (node && typeof node === 'object') {
              Object.entries(node).forEach(([key, value]) => {
                const nextPath = path ? `${path}.${key}` : key;
                walk(value, nextPath, onString);
              });
            }
          }

          for (const file of editedThemes) {
            const raw = fs.readFileSync(file, 'utf8');
            const json = JSON.parse(raw);
            const meta = THEME_META[file];
            const expectedBaseHex = meta ? expectedSelectionBaseByTheme[meta.nvimTheme] : null;

            walk(json, '', (text, path) => {
              const looseTokens = text.match(/#[0-9A-Fa-f]+/g) || [];

              for (const token of looseTokens) {
                const isSixDigit = /^#[0-9A-Fa-f]{6}$/.test(token);
                const isEightDigit = /^#[0-9A-Fa-f]{8}$/.test(token);

                if (!isSixDigit && !isEightDigit) {
                  problems.push(
                    `${file}:${path} has malformed hex token '${token}' (allowed: #RRGGBB or #RRGGBBAA)`
                  );
                  continue;
                }

                const normalized = token.toLowerCase();

                if (isEightDigit && normalized === '#00000000') {
                  continue;
                }

                const baseHex = normalized.slice(0, 7);

                if (!sourceHexSet.has(baseHex)) {
                  problems.push(
                    `${file}:${path} uses '${token}' whose base color '${baseHex}' is not in kanagawa-paper.nvim colors.lua`
                  );
                }
              }
            });

            if (expectedBaseHex) {
              for (const key of REQUIRED_SELECTION_KEYS) {
                const value = json?.colors?.[key];
                if (typeof value !== 'string') {
                  problems.push(`${file}:colors.${key} is missing or not a string`);
                  continue;
                }

                if (!/^#[0-9A-Fa-f]{8}$/.test(value)) {
                  problems.push(`${file}:colors.${key} must be an 8-digit hex (#RRGGBBAA)`);
                  continue;
                }

                const baseHex = value.toLowerCase().slice(0, 7);
                if (baseHex !== expectedBaseHex) {
                  problems.push(
                    `${file}:colors.${key} must use base '${expectedBaseHex}' from ${meta.nvimTheme}.ui.bg_visual (found '${baseHex}')`
                  );
                }
              }
            }
          }

          if (problems.length > 0) {
            console.error('Theme color sanity checks failed:');
            for (const problem of problems) {
              console.error(`- ${problem}`);
            }
            process.exit(1);
          }

          console.log('Theme color sanity checks passed.');
          NODE
